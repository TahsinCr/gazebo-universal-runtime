<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gazebo Web Console</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #020403;
      --toolbar: rgba(6, 13, 12, 0.82);
      --toolbar-strong: rgba(9, 20, 18, 0.94);
      --line: rgba(192, 255, 233, 0.18);
      --line-strong: rgba(192, 255, 233, 0.38);
      --text: #f4fff9;
      --muted: #a5bdb5;
      --accent: #75f0bd;
      --amber: #ffc96a;
      --danger: #ff7a6d;
      --shadow: 0 18px 70px rgba(0, 0, 0, 0.48);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body,
    #app,
    #screen {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 15%, rgba(117, 240, 189, 0.08), transparent 28rem),
        linear-gradient(180deg, #020504 0%, #010101 100%);
      color: var(--text);
      font-family: "Aptos", "Segoe UI", sans-serif;
    }

    #app {
      position: relative;
      background: var(--bg);
    }

    #screen {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #010101;
    }

    #screen canvas {
      image-rendering: auto;
      outline: none;
    }

    .top-hotspot {
      position: fixed;
      z-index: 20;
      top: 0;
      right: 0;
      left: 0;
      height: 18px;
    }

    .toolbar {
      position: fixed;
      z-index: 30;
      top: 10px;
      right: 14px;
      left: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 52px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(117, 240, 189, 0.08), rgba(255, 201, 106, 0.04)),
        var(--toolbar);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(1.1);
      transform: translateY(calc(-100% - 24px));
      transition: transform 180ms ease, opacity 180ms ease;
      opacity: 0;
    }

    .toolbar:hover,
    body.toolbar-open .toolbar,
    body.toolbar-pinned .toolbar {
      transform: translateY(0);
      opacity: 1;
    }

    .toolbar::after {
      position: absolute;
      right: 18px;
      bottom: -8px;
      left: 18px;
      height: 1px;
      content: "";
      background: linear-gradient(90deg, transparent, rgba(117, 240, 189, 0.42), transparent);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 170px;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(117, 240, 189, 0.38);
      border-radius: 12px;
      background: rgba(117, 240, 189, 0.12);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .title {
      min-width: 0;
      line-height: 1.1;
    }

    .title strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.95rem;
      letter-spacing: -0.02em;
    }

    .title span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.76rem;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .segmented {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.045);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: max-content;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--muted);
      font-size: 0.82rem;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--amber);
      box-shadow: 0 0 18px rgba(255, 201, 106, 0.64);
    }

    .status.connected .dot {
      background: var(--accent);
      box-shadow: 0 0 18px rgba(117, 240, 189, 0.74);
    }

    .status.error .dot {
      background: var(--danger);
      box-shadow: 0 0 18px rgba(255, 122, 109, 0.72);
    }

    button,
    a.button {
      appearance: none;
      min-height: 34px;
      border: 1px solid rgba(244, 255, 249, 0.14);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.075);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-size: 0.82rem;
      padding: 7px 11px;
      text-decoration: none;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
    }

    button:hover,
    a.button:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: rgba(117, 240, 189, 0.14);
    }

    .primary {
      border-color: rgba(117, 240, 189, 0.5);
      background: linear-gradient(135deg, rgba(117, 240, 189, 0.22), rgba(255, 201, 106, 0.1));
    }

    .active {
      border-color: rgba(255, 201, 106, 0.58);
      background: rgba(255, 201, 106, 0.16);
      color: #fff7e7;
    }

    .hint {
      position: fixed;
      right: 18px;
      bottom: 16px;
      z-index: 10;
      max-width: min(520px, calc(100% - 36px));
      padding: 11px 13px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(4, 9, 8, 0.72);
      color: var(--muted);
      backdrop-filter: blur(14px);
      font-size: 0.84rem;
      line-height: 1.38;
    }

    .edge-label {
      position: fixed;
      z-index: 12;
      top: 3px;
      left: 50%;
      width: 140px;
      height: 3px;
      border-radius: 999px;
      background: rgba(117, 240, 189, 0.42);
      box-shadow: 0 0 16px rgba(117, 240, 189, 0.38);
      transform: translateX(-50%);
      opacity: 0.68;
      transition: opacity 160ms ease;
    }

    body.toolbar-open .edge-label,
    body.toolbar-pinned .edge-label {
      opacity: 0;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 860px) {
      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .brand,
      .controls,
      .status {
        width: 100%;
      }

      .controls {
        justify-content: stretch;
      }

      button,
      a.button {
        flex: 1 1 auto;
      }

      .segmented {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main id="app">
    <div id="screen"></div>
    <div class="top-hotspot" aria-hidden="true"></div>
    <div class="edge-label" aria-hidden="true"></div>

    <header class="toolbar" id="toolbar">
      <div class="brand">
        <div class="mark">GZ</div>
        <div class="title">
          <strong>Gazebo Web Console</strong>
          <span>Move cursor to the top edge for controls</span>
        </div>
      </div>

      <div class="controls">
        <div id="status" class="status"><span class="dot"></span><span>Connecting</span></div>
        <div class="segmented" aria-label="Stream profile">
          <button data-profile="fast" type="button">Fast</button>
          <button data-profile="balanced" type="button">Balanced</button>
          <button data-profile="quality" type="button">Quality</button>
        </div>
        <button id="fit" type="button">Fit</button>
        <button id="actual" class="active" type="button">1:1</button>
        <button id="pin" type="button">Pin</button>
        <button id="reconnect" type="button">Reconnect</button>
        <button id="fullscreen" class="primary" type="button">Fullscreen</button>
      </div>
    </header>

    <div id="hint" class="hint">
      Connecting to the low-latency local stream. For direct hardware OpenGL, use native UI on Linux.
    </div>
  </main>

  <script type="module">
    import RFB from './core/rfb.js';

    const screen = document.getElementById('screen');
    const status = document.getElementById('status');
    const statusText = status.querySelector('span:last-child');
    const hint = document.getElementById('hint');
    const toolbar = document.getElementById('toolbar');
    const reconnectButton = document.getElementById('reconnect');
    const fullscreenButton = document.getElementById('fullscreen');
    const fitButton = document.getElementById('fit');
    const actualButton = document.getElementById('actual');
    const pinButton = document.getElementById('pin');
    const profileButtons = [...document.querySelectorAll('[data-profile]')];
    const streamProfiles = {
      fast: { label: 'Fast', quality: 6, compression: 0 },
      balanced: { label: 'Balanced', quality: 8, compression: 1 },
      quality: { label: 'Quality', quality: 9, compression: 2 },
    };
    let rfb;
    let reconnectTimer;
    let toolbarTimer;
    let scaleViewport = query('scale', 'false') === 'true';
    let streamProfile = normalizeProfile(query('profile', 'fast'));

    function query(name, fallback = '') {
      const params = new URLSearchParams(`${window.location.search}${window.location.hash.replace('#', '&')}`);
      return params.get(name) || fallback;
    }

    function intQuery(name, fallback, min, max) {
      const value = Number.parseInt(query(name, `${fallback}`), 10);

      if (!Number.isFinite(value)) {
        return fallback;
      }

      return Math.max(min, Math.min(max, value));
    }

    function normalizeProfile(profile) {
      return Object.hasOwn(streamProfiles, profile) ? profile : 'fast';
    }

    function streamSettings(useUrlOverrides = true) {
      const profile = streamProfiles[streamProfile];

      if (!useUrlOverrides) {
        return profile;
      }

      return {
        ...profile,
        quality: intQuery('quality', profile.quality, 0, 9),
        compression: intQuery('compression', profile.compression, 0, 9),
      };
    }

    function setStatus(text, mode = '') {
      status.className = `status ${mode}`.trim();
      statusText.textContent = text;
    }

    function websocketUrl() {
      const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
      const host = query('host', window.location.hostname);
      const port = query('port', window.location.port);
      const path = query('path', 'websockify').replace(/^\/+/, '');
      return `${protocol}://${host}${port ? `:${port}` : ''}/${path}`;
    }

    function applyScale() {
      fitButton.classList.toggle('active', scaleViewport);
      actualButton.classList.toggle('active', !scaleViewport);

      if (rfb) {
        rfb.scaleViewport = scaleViewport;
        rfb.clipViewport = !scaleViewport;
      }
    }

    function applyStreamProfile(useUrlOverrides = true) {
      const settings = streamSettings(useUrlOverrides);

      profileButtons.forEach(button => {
        button.classList.toggle('active', button.dataset.profile === streamProfile);
      });

      if (rfb) {
        rfb.qualityLevel = settings.quality;
        rfb.compressionLevel = settings.compression;
      }
    }

    function showToolbar() {
      document.body.classList.add('toolbar-open');
      window.clearTimeout(toolbarTimer);

      if (!document.body.classList.contains('toolbar-pinned')) {
        toolbarTimer = window.setTimeout(() => {
          if (!toolbar.matches(':hover')) {
            document.body.classList.remove('toolbar-open');
          }
        }, 1800);
      }
    }

    function connect() {
      window.clearTimeout(reconnectTimer);

      if (rfb) {
        rfb.disconnect();
      }

      setStatus('Connecting');

      rfb = new RFB(screen, websocketUrl(), {
        credentials: {
          password: query('password', ''),
        },
      });

      rfb.focusOnClick = true;
      rfb.showDotCursor = true;
      rfb.resizeSession = query('resize', 'false') !== 'false';
      applyStreamProfile(true);
      applyScale();

      rfb.addEventListener('connect', () => {
        setStatus(`${streamSettings(false).label} stream`, 'connected');
        hint.classList.add('hidden');
        rfb.focus();
      });

      rfb.addEventListener('disconnect', event => {
        setStatus(event.detail.clean ? 'Disconnected' : 'Connection lost', event.detail.clean ? '' : 'error');
        hint.classList.remove('hidden');
        showToolbar();

        if (!event.detail.clean) {
          reconnectTimer = window.setTimeout(connect, 1200);
        }
      });

      rfb.addEventListener('credentialsrequired', () => {
        const password = window.prompt('VNC password');
        rfb.sendCredentials({ password });
      });
    }

    window.addEventListener('mousemove', event => {
      if (event.clientY <= 8) {
        showToolbar();
      }
    });

    toolbar.addEventListener('mouseleave', () => {
      if (!document.body.classList.contains('toolbar-pinned')) {
        toolbarTimer = window.setTimeout(() => {
          document.body.classList.remove('toolbar-open');
        }, 600);
      }
    });

    fitButton.addEventListener('click', () => {
      scaleViewport = true;
      applyScale();
    });

    actualButton.addEventListener('click', () => {
      scaleViewport = false;
      applyScale();
    });

    pinButton.addEventListener('click', () => {
      document.body.classList.toggle('toolbar-pinned');
      pinButton.classList.toggle('active', document.body.classList.contains('toolbar-pinned'));
      showToolbar();
    });

    profileButtons.forEach(button => {
      button.addEventListener('click', () => {
        streamProfile = normalizeProfile(button.dataset.profile);
        applyStreamProfile(false);

        if (status.classList.contains('connected')) {
          setStatus(`${streamSettings(false).label} stream`, 'connected');
        }
      });
    });

    reconnectButton.addEventListener('click', connect);

    fullscreenButton.addEventListener('click', () => {
      document.documentElement.requestFullscreen?.();
      rfb?.focus();
    });

    applyScale();
    applyStreamProfile(true);
    showToolbar();
    connect();
  </script>
</body>
</html>
